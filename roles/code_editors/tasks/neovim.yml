---
- name: Install neovim
  when: not skip_root | bool
  ansible.builtin.package:
    name: neovim
    state: present
  become: "{{ become_root }}"

- name: Create neovim config folders
  ansible.builtin.file:
    path: "{{ home_folder }}/.config/nvim/lua/config"
    state: directory
    mode: '755'

- name: Copy neovim config
  ansible.builtin.copy:
    src: files/neovim/init.lua
    dest: "{{ home_folder }}/.config/nvim/"
    mode: preserve

- name: Copy neovim config extras
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "{{ home_folder }}/.config/nvim/lua/config/"
    mode: preserve
  with_fileglob:
    - "files/neovim/lua/config/*"

- name: Create neovim plugins folders
  ansible.builtin.file:
    path: "{{ home_folder }}/.config/nvim/lua/plugins"
    state: directory
    mode: '755'

- name: Copy neovim config extras
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "{{ home_folder }}/.config/nvim/lua/plugins/"
    mode: preserve
  with_fileglob:
    - "files/neovim/lua/plugins/*"
